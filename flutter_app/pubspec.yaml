name: openclaw
description: 次元虾 Android CLI runtime integration - standalone, no Termux required.
publish_to: 'none'
version: 2.5.0+143

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  webview_flutter: ^4.4.0
  webview_flutter_android: ^4.11.0
  dio: ^5.4.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  google_fonts: ^6.1.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bionic_bypass.js
    - assets/resolv.conf
    - assets/ic_launcher.png
    - assets/bootstrap/openclaw-rootfs-noble-arm64.tar.gz
    - assets/api2py/
    - assets/api2py/app/
    - assets/api2py/data/
    - assets/api2py/public/static/
    - assets/api2py/public/static/lib/
    - assets/api2py/scripts/
    - assets/open_source/OPEN_SOURCE_REPOSITORIES.md
    - assets/open_source/OPEN_SOURCE_NOTICES.md
    - assets/open_source/THIRD_PARTY_NOTICES.md
    - assets/open_source/OPEN_SOURCE_SOURCES.md
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
