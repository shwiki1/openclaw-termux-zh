plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.5.0"
}

def displayVersionName = { String versionName ->
    def normalized = versionName == null ? "" : versionName.trim()
    if (normalized.isEmpty()) {
        return "1.0"
    }
    def matcher = normalized =~ /^(\d+)\.(\d+)\.0$/
    if (matcher.matches()) {
        return "${matcher[0][1]}.${matcher[0][2]}"
    }
    return normalized
}

def androidVersionName = localProperties.getProperty("flutter.androidVersionName")
if (androidVersionName == null || androidVersionName.trim().isEmpty()) {
    androidVersionName = displayVersionName(flutterVersionName)
} else {
    androidVersionName = androidVersionName.trim()
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def hasKeystore = keystoreProperties.containsKey('storeFile') &&
    file(keystoreProperties['storeFile']).exists()

android {
    namespace = "com.agent.cyx"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.agent.cyx"
        minSdk = 29
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = androidVersionName
    }

    if (hasKeystore) {
        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation 'com.github.termux.termux-app:terminal-view:v0.118.0'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'androidx.media3:media3-exoplayer:1.4.1'
    implementation 'androidx.media3:media3-ui:1.4.1'
    implementation 'com.arthenica:ffmpeg-kit-full:6.0-2'
    implementation 'org.apache.commons:commons-compress:1.26.0'
    implementation 'org.tukaani:xz:1.9'
    implementation 'com.github.luben:zstd-jni:1.5.6-4@aar'
}

flutter {
    source = "../.."
}
