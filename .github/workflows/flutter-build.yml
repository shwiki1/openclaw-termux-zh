name: Build OpenClaw Apps

on:
  push:
    branches: ['*']
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-prebuilt-rootfs.sh'
      - 'scripts/prebuilt-rootfs-metadata.sh'
      - 'scripts/fetch-prebuilt-rootfs-asset.sh'
      - 'scripts/publish-prebuilt-rootfs-asset.sh'
      - 'scripts/build-apk.sh'
      - 'scripts/build_release.py'
      - 'scripts/versioning.py'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-prebuilt-rootfs.sh'
      - 'scripts/prebuilt-rootfs-metadata.sh'
      - 'scripts/fetch-prebuilt-rootfs-asset.sh'
      - 'scripts/publish-prebuilt-rootfs-asset.sh'
      - 'scripts/build-apk.sh'
      - 'scripts/build_release.py'
      - 'scripts/versioning.py'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a GitHub Release after the cloud build succeeds'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build arm64-v8a APK
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.collect.outputs.version }}
      version_name: ${{ steps.collect.outputs.version_name }}
      version_code: ${{ steps.collect.outputs.version_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Java 17
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install host build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils curl gzip qemu-user-static unzip xz-utils zstd

      - name: Restore bundled OpenClaw rootfs
        id: restore_rootfs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if bash scripts/fetch-prebuilt-rootfs-asset.sh --arch arm64 --release-tag basic-resource; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bundled OpenClaw rootfs
        if: ${{ steps.restore_rootfs.outputs.restored != 'true' }}
        run: |
          set -euo pipefail
          bash scripts/build-prebuilt-rootfs.sh --no-docker --arch arm64 --mirror http://mirrors.ustc.edu.cn/ubuntu-ports
          ROOTFS=flutter_app/assets/bootstrap/openclaw-rootfs-noble-arm64.tar.gz
          test -s "$ROOTFS"
          gzip -t "$ROOTFS"
          SIZE_MB=$(du -m "$ROOTFS" | cut -f1)
          if [ "$SIZE_MB" -lt 80 ]; then
            echo "ERROR: bundled rootfs looks too small (${SIZE_MB} MB)"
            exit 1
          fi
          echo "Bundled rootfs size: ${SIZE_MB} MB"
          sudo rm -rf .tmp/prebuilt-rootfs .tmp/rootfs-cache

      - name: Publish bundled OpenClaw rootfs
        if: ${{ steps.restore_rootfs.outputs.restored != 'true' && (vars.BUILD_BUNDLED_ROOTFS == 'true' || (github.ref == 'refs/heads/main' && github.event_name == 'push')) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish-prebuilt-rootfs-asset.sh --arch arm64 --release-tag basic-resource

      - name: Verify bundled OpenClaw rootfs
        run: |
          set -euo pipefail
          ROOTFS=flutter_app/assets/bootstrap/openclaw-rootfs-noble-arm64.tar.gz
          test -s "$ROOTFS"
          if head -c 128 "$ROOTFS" | grep -aq 'git-lfs.github.com/spec/v1'; then
            echo "ERROR: $ROOTFS is still a Git LFS pointer. Ensure checkout pulled LFS files or enable BUILD_BUNDLED_ROOTFS."
            exit 1
          fi
          gzip -t "$ROOTFS"
          SIZE_MB=$(du -m "$ROOTFS" | cut -f1)
          if [ "$SIZE_MB" -lt 80 ]; then
            echo "ERROR: bundled rootfs looks too small (${SIZE_MB} MB)"
            exit 1
          fi
          echo "Bundled rootfs verified: ${SIZE_MB} MB"

      - name: Install Android SDK packages
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "$GITHUB_ENV"

          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "${SDK_ROOT}/cmdline-tools" -path '*/bin/sdkmanager' -type f 2>/dev/null | sort -V | tail -n 1 || true)"
          fi

          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager was not found under ${SDK_ROOT}/cmdline-tools"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager 2>/dev/null || true
            exit 1
          fi

          echo "$(dirname "$SDKMANAGER")" >> "$GITHUB_PATH"
          rm -rf "${SDK_ROOT}/.temp" "${SDK_ROOT}/ndk/27.0.12077973" "${SDK_ROOT}/ndk/28.2.13676358"

          set +o pipefail
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses >/dev/null
          set -o pipefail

          install_sdk_package() {
            for attempt in 1 2 3; do
              rm -rf "${SDK_ROOT}/.temp"
              if "$SDKMANAGER" --sdk_root="$SDK_ROOT" "$@"; then
                return 0
              fi
              echo "sdkmanager attempt ${attempt} failed for: $*" >&2
              sleep $((attempt * 5))
            done
            return 1
          }

          install_sdk_package \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
          install_sdk_package "ndk;27.0.12077973"
          install_sdk_package "ndk;28.2.13676358"

          test -f "${SDK_ROOT}/platforms/android-36/android.jar"
          test -d "${SDK_ROOT}/ndk/27.0.12077973"
          test -d "${SDK_ROOT}/ndk/28.2.13676358"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: 8.11.1

      - name: Prepare Android local properties
        working-directory: flutter_app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FLUTTER_SDK="$(dirname "$(dirname "$(command -v flutter)")")"
          APP_VERSION="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
          VERSION_BASE="${APP_VERSION%%+*}"
          PUBSPEC_VERSION_CODE="${APP_VERSION#*+}"
          if [ "$PUBSPEC_VERSION_CODE" = "$APP_VERSION" ] || [ -z "$PUBSPEC_VERSION_CODE" ]; then
            PUBSPEC_VERSION_CODE="1"
          fi
          VERSION_CODE="$((PUBSPEC_VERSION_CODE + 1))"
          # Failed builds 157, 158, 160, and 161 must never be reused. Keep
          # the source anchor while assigning the fresh Android versionCode.
          MINIMUM_RELEASE_BUILD=164
          if [ "$VERSION_CODE" -lt "$MINIMUM_RELEASE_BUILD" ]; then
            VERSION_CODE="$MINIMUM_RELEASE_BUILD"
          fi
          LATEST_RELEASE_BUILD="$(
            {
              gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.assets[]?.name' 2>/dev/null || true
            } \
              | sed -nE 's/.*-([0-9]+)-arm64-v8a\.apk/\1/p' \
              | sort -n \
              | tail -n 1
          )"
          if ! [[ "$LATEST_RELEASE_BUILD" =~ ^[0-9]+$ ]]; then
            LATEST_RELEASE_BUILD=0
          fi
          if [ "${LATEST_RELEASE_BUILD}" -ge "${VERSION_CODE}" ]; then
            VERSION_CODE="$((LATEST_RELEASE_BUILD + 1))"
          fi
          eval "$(
            python3 ../scripts/versioning.py derive \
              --base-version "$VERSION_BASE" \
              --base-build "$PUBSPEC_VERSION_CODE" \
              --target-build "$VERSION_CODE" \
              --format shell
          )"
          VERSION_NAME="$SEMANTIC_VERSION"
          VERSION_DISPLAY="$DISPLAY_VERSION"
          echo "APP_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "APP_VERSION_DISPLAY=${VERSION_DISPLAY}" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "APP_FULL_VERSION=${VERSION_NAME}+${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "APP_ANDROID_VERSION_NAME=${VERSION_DISPLAY}" >> "$GITHUB_ENV"

          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "flutter.sdk=${FLUTTER_SDK}"
            echo "flutter.versionName=${VERSION_NAME}"
            echo "flutter.versionCode=${VERSION_CODE}"
            echo "flutter.androidVersionName=${VERSION_DISPLAY}"
          } > android/local.properties

          flutter --version
          java -version

      - name: Generate Gradle wrapper
        working-directory: flutter_app/android
        run: |
          set -euo pipefail
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1 --distribution-type all
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "No KEYSTORE_BASE64 secret found; release artifacts will use the debug signing fallback."
            exit 0
          fi

          for name in KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: $name is required when KEYSTORE_BASE64 is set."
              exit 1
            fi
          done

          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=${{ github.workspace }}/release.jks"
          } > flutter_app/android/key.properties

      - name: Fetch PRoot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify PRoot binaries
        run: |
          set -euo pipefail
          echo "Checking jniLibs contents..."
          for abi in arm64-v8a; do
            for lib in libproot.so libprootloader.so libprootloader32.so libtalloc.so libandroid-shmem.so; do
              FILE="flutter_app/android/app/src/main/jniLibs/${abi}/${lib}"
              if [ ! -f "$FILE" ]; then
                echo "ERROR: Missing $FILE"
                exit 1
              fi
              SIZE=$(stat -c%s "$FILE")
              if [ "$SIZE" -lt 1000 ]; then
                echo "WARN: $FILE looks like a placeholder (${SIZE} bytes)"
              else
                echo "OK: $FILE (${SIZE} bytes)"
              fi
            done
          done

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze Dart code
        working-directory: flutter_app
        run: |
          set -euo pipefail
          if ! flutter analyze --no-fatal-infos; then
            {
              echo "### Flutter Analyze"
              echo ""
              echo "`flutter analyze` reported issues, but the APK build continued."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build arm64-v8a APK
        working-directory: flutter_app
        run: |
          set -euo pipefail
          flutter build apk --release \
            --split-per-abi \
            --target-platform android-arm64 \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_VERSION_CODE" \
            --dart-define=APP_VERSION_NAME="$APP_VERSION_NAME" \
            --dart-define=APP_VERSION_DISPLAY="$APP_VERSION_DISPLAY" \
            --dart-define=APP_VERSION_CODE="$APP_VERSION_CODE"

      - name: Verify APK native PRoot binaries
        run: |
          set -euo pipefail
          check_apk() {
            local apk="$1"
            local abi="$2"
            for lib in libproot.so libprootloader.so libprootloader32.so libtalloc.so libandroid-shmem.so; do
              if ! unzip -l "$apk" "lib/${abi}/${lib}" | grep -q "lib/${abi}/${lib}"; then
                echo "ERROR: Missing lib/${abi}/${lib} in $apk"
                exit 1
              fi
            done
          }

          check_apk flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk arm64-v8a

      - name: Collect artifacts
        id: collect
        run: |
          set -euo pipefail
          format_display_version() {
            local version_name="$1"
            if [[ "$version_name" =~ ^([0-9]+)\.([0-9]+)\.0$ ]]; then
              echo "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
              return
            fi
            echo "$version_name"
          }

          VERSION_NAME="${APP_VERSION_NAME:-$(awk '/^version:/ {print $2; exit}' flutter_app/pubspec.yaml | cut -d'+' -f1)}"
          VERSION="${APP_VERSION_DISPLAY:-$(format_display_version "$VERSION_NAME")}"
          VERSION_CODE="${APP_VERSION_CODE:-0}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          mkdir -p artifacts

          cp flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "artifacts/CiYuanXia-v${VERSION}-${VERSION_CODE}-arm64-v8a.apk"

          echo "### Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install-visible version: v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "Internal version/build: ${VERSION_NAME}+${VERSION_CODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in artifacts/*; do
            SIZE="$(du -h "$f" | cut -f1)"
            echo "| \`$(basename "$f")\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ciyuanxia-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const version = '${{ steps.collect.outputs.version }}';
            const versionName = '${{ steps.collect.outputs.version_name }}';
            const versionCode = '${{ steps.collect.outputs.version_code }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              `## Build Successful`,
              ``,
              `**Install-visible version:** \`v${version}\``,
              ``,
              `**Internal version/build:** \`${versionName}+${versionCode}\``,
              ``,
              `### Download APK`,
              ``,
              `| Architecture | Download |`,
              `|---|---|`,
              `| arm64-v8a | [CiYuanXia-v${version}-${versionCode}-arm64-v8a.apk](${runUrl}#artifacts) |`,
              ``,
              `> Download from [**Actions Artifacts**](${runUrl}#artifacts)`,
              ``,
              `---`,
              `*Built from ${process.env.GITHUB_SHA.substring(0, 7)} by [GitHub Actions](${runUrl})*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Build Successful')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment build failure on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## Build Failed`,
                ``,
                `The build failed for commit ${process.env.GITHUB_SHA.substring(0, 7)}.`,
                ``,
                `[View build logs](${runUrl})`,
              ].join('\n'),
            });

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download APK artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ciyuanxia-apks
          path: artifacts

      - name: Get version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 次元虾 v${{ steps.version.outputs.version }}
          body: |
            ## 次元虾 Android v${{ steps.version.outputs.version }}

            Standalone Android app — no Termux required.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `CiYuanXia-v${{ needs.build.outputs.version }}-${{ needs.build.outputs.version_code }}-arm64-v8a.apk` | arm64-v8a Android devices |

            ### First Run
            1. Install the APK
            2. Follow the setup wizard; runtime resources are downloaded, restored from the basic-resource release, or imported from local archives
            3. Add your API/provider configuration
            4. Start the gateway from the dashboard
            5. Access the web dashboard at `http://127.0.0.1:18789`

            ### Requirements
            - Android 10+ (API 29)
            - arm64-v8a device
            - ~1.5GB free storage for extracting the bundled environment
            - Internet connection only for API/model access and optional updates
          files: artifacts/*
          draft: false
          prerelease: false
